<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synth — play synthesizers in your browser</title>
    <meta name="description" content="A free synthesizer you play with your computer keyboard. Design sounds, add effects, sequence loops, and share patches by link." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=IBM+Plex+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main id="app">
      <div id="scrim">
        <h1>SYNTH</h1>
        <p>Click anywhere or press any key to start audio</p>
        <p class="scrim-help">Z-row + Q-row play notes / Arrows shift octave / Tab and Left Shift bend pitch</p>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
