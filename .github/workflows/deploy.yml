name: deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      # Gate the deploy: the daily blog routine pushes new HTML straight to main,
      # so this is where a re-introduced ad script or an unescaped post field gets
      # caught — before it reaches the live site.
      - run: npm test
      - run: npm run build
      - env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 deploy
          npx --yes wrangler@4 deploy -c wrangler-synth.toml
